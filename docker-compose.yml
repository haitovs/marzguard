services:
  marzguard:
    build: .
    container_name: marzguard
    restart: unless-stopped
    ports:
      - "3004:3004"
    volumes:
      - marzguard_data:/app/data
      - /etc/letsencrypt:/etc/letsencrypt:ro
    env_file:
      - .env
    environment:
      - DATABASE_URL=sqlite+aiosqlite:///./data/marzguard.db
    healthcheck:
      test: ["CMD", "curl", "-f", "http://127.0.0.1:3004/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

volumes:
  marzguard_data:
